name: CI

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit hash for testing metacall/protocol"
        required: false
        default: "master"
      repo:
        description: "Repository from which we should clone metacall/protocol"
        required: false
        default: "metacall/protocol"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  protocol:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Protocol Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repo }}
          path: protocol
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Pack Latest Protocol
        if: github.event_name == 'workflow_dispatch'
        working-directory: protocol
        run: |
          npm i
          npm run build
          npm pack

      - uses: actions/upload-artifact@v4
        with:
          name: metacall-protocol
          path: ./metacall-protocol-*.tgz
          if-no-files-found: error

  ci:
    needs: protocol
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MetaCall CLI
        run: wget -O - https://raw.githubusercontent.com/metacall/install/master/install.sh | sh

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Installing Dependencies
        run: npm i

      - uses: actions/download-artifact@v8.0.1
        if: github.event_name == 'workflow_dispatch'
        with:
            name: metacall-protocol

      - name: Install Latest Protocol
        if: github.event_name == 'workflow_dispatch'
        run: |
            npm uninstall --save @metacall/protocol
            npm i ./metacall-protocol-*.tgz

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run Unit Tests
        shell: bash
        run: npm run test

      - name: Run Integration Tests
        run: npm run integration

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          unset NODE_AUTH_TOKEN
          npm publish --provenance