name: CI

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit hash for testing metacall/protocol"
        required: false
        default: "master"
      repo:
        description: "Repository from which we should clone metacall/protocol"
        required: false
        default: "metacall/protocol"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MetaCall CLI
        run: wget -O - https://raw.githubusercontent.com/metacall/install/master/install.sh | sh

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Installing Dependencies
        run: npm i

      - name: Debug Protocol
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "${{ github.event.inputs.repository }}"
          echo "${{ github.event.inputs.ref }}"

      - name: Checkout Protocol Repository
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repository }}
          path: protocol
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Install Latest Protocol
        if: github.event_name == 'workflow_dispatch'
        working-directory: protocol
        run: |
          npm i
          npm run build
          npm pack
          cd ..
          npm uninstall @metacall/protocol
          npm i ./protocol/metacall-protocol-*.tgz
          rm -rf protocol

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run Unit Tests
        shell: bash
        run: npm run test

      - name: Run Integration Tests
        run: npm run integration

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          unset NODE_AUTH_TOKEN
          npm publish --provenance